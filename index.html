<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<form class="container mt-4" onsubmit="handleFormSubmit(event)">

    <div class="mb-3">
        <label class="form-label">Choose expense amount:</label>
        <input type="number" id="amount" name="amount" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Choose description:</label>
        <input type="text" id="description" name="description" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Choose a category:</label>
        <select id="category" name="category" class="form-select">
            <option value="Movie">Movie</option>
            <option value="Food">Food</option>
            <option value="Fuel">Fuel</option>
            <option value="Travel">Travel</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">
        Add Expense
    </button>

</form>
<ul class="list-group mt-3"></ul>

</body>
<script src="index.js"></script>
</html>
